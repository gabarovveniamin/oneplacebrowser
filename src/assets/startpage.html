<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comet Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .logo {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 50%, #fbbc04 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 24px;
            color: #e0e0e0;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .search-container {
            display: flex;
            margin-bottom: 60px;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            background-color: #fff;
            color: #202124;
            outline: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: box-shadow 0.3s ease;
        }

        .search-box:focus {
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.4);
        }

        .search-box::placeholder {
            color: #9aa0a6;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 80px;
        }

        .button {
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: transparent;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .shortcuts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 20px;
            margin-top: 80px;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            color: #e0e0e0;
        }

        .shortcut:hover {
            transform: scale(1.1);
        }

        .shortcut-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .shortcut-name {
            font-size: 12px;
            color: #bdc1c6;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: #9aa0a6;
        }

        .footer a {
            color: #9aa0a6;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">COMET</div>
        <div class="tagline">Быстрый и мощный браузер</div>

        <div class="search-container">
            <input 
                type="text" 
                class="search-box" 
                placeholder="Поиск в Интернете или адрес сайта"
                id="searchInput"
            >
        </div>

        <div class="buttons">
            <button class="button" onclick="search()">Поиск в Comet</button>
            <button class="button" onclick="luckySearch()">Мне повезёт!</button>
        </div>

        <div class="shortcuts">
            <a href="https://google.com" class="shortcut" target="_blank">
                <div class="shortcut-icon">🔍</div>
                <div class="shortcut-name">Google</div>
            </a>
            <a href="https://youtube.com" class="shortcut" target="_blank">
                <div class="shortcut-icon">📺</div>
                <div class="shortcut-name">YouTube</div>
            </a>
            <a href="https://github.com" class="shortcut" target="_blank">
                <div class="shortcut-icon">💻</div>
                <div class="shortcut-name">GitHub</div>
            </a>
            <a href="https://stackoverflow.com" class="shortcut" target="_blank">
                <div class="shortcut-icon">❓</div>
                <div class="shortcut-name">Stack Overflow</div>
            </a>
            <a href="https://reddit.com" class="shortcut" target="_blank">
                <div class="shortcut-icon">📱</div>
                <div class="shortcut-name">Reddit</div>
            </a>
            <a href="https://wikipedia.org" class="shortcut" target="_blank">
                <div class="shortcut-icon">📖</div>
                <div class="shortcut-name">Wikipedia</div>
            </a>
        </div>
    </div>

    <div class="footer">
        <a href="#">О браузере</a>
        <a href="#">Конфиденциальность</a>
        <a href="#">Условия использования</a>
        <a href="#">Настройки</a>
    </div>

    <script>
        document.getElementById('searchInput').focus();

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        function search() {
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                window.location.href = searchUrl;
            }
        }

        function luckySearch() {
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                const luckyUrl = 'https://www.google.com/search?q=' + encodeURIComponent(query) + '&btnI=1';
                window.location.href = luckyUrl;
            }
        }
    </script>
</body>
</html>
